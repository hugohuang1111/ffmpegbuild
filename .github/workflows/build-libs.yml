# ========================================================================
# Build FFmpeg + OpenSSL Libraries for Android & iOS
#
# Uses a macOS runner (macos-14 Apple Silicon) to cross-compile for:
#   Android: arm64-v8a + armeabi-v7a
#   iOS:     arm64 (device) + x86_64 (simulator)
#
# OpenSSL provides HTTPS/TLS support linked into FFmpeg.
# 16KB page alignment applied for Android (Google Play requirement).
# ========================================================================

name: Build FFmpeg + OpenSSL Libraries

on:
  workflow_dispatch:

env:
  FFMPEG_VERSION: "8.1.2"
  OPENSSL_VERSION: "4.0.1"
  NDK_VERSION: "29.0.14206865"
  TARGET_SDK: 35
  MIN_API: 29
  MIN_IOS_SDK: "14.0"

# ========================================================================
# Job 1/2: Android Libraries (arm64-v8a + armeabi-v7a)
# ========================================================================
jobs:
  build-android:
    name: Android (arm64-v8a + armeabi-v7a)
    runs-on: macos-14
    defaults:
      run:
        shell: bash

    steps:
      # ----------------------------------------------------------------
      # Setup
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Java (required by Android SDK)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v4

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"
          echo "NDK_PATH=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"

      # ----------------------------------------------------------------
      # Download sources
      # ----------------------------------------------------------------
      - name: Download OpenSSL source
        run: |
          curl -fsSL \
            "https://github.com/openssl/openssl/releases/download/openssl-${{ env.OPENSSL_VERSION }}/openssl-${{ env.OPENSSL_VERSION }}.tar.gz" \
            -o openssl.tar.gz
          tar xzf openssl.tar.gz
          mv "openssl-${{ env.OPENSSL_VERSION }}" openssl

      - name: Download FFmpeg source
        run: |
          curl -fsSL \
            "https://ffmpeg.org/releases/ffmpeg-${{ env.FFMPEG_VERSION }}.tar.gz" \
            -o ffmpeg.tar.gz
          tar xzf ffmpeg.tar.gz
          mv "ffmpeg-${{ env.FFMPEG_VERSION }}" ffmpeg

      # ----------------------------------------------------------------
      # 1a. OpenSSL → Android arm64-v8a
      # ----------------------------------------------------------------
      - name: Build OpenSSL for Android arm64-v8a
        working-directory: openssl
        run: |
          TOOLCHAIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/darwin-x86_64"
          export PATH="$TOOLCHAIN/bin:$PATH"
          # 16KB page alignment for Google Play compliance
          export LDFLAGS="-Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384"

          make clean 2>/dev/null || true
          ./Configure android-arm64 -D__ANDROID_API__=${{ env.MIN_API }} \
            shared \
            no-ssl3 no-comp no-hw no-engine \
            --prefix="$GITHUB_WORKSPACE/outputs/android/arm64-v8a" \
            --openssldir="$GITHUB_WORKSPACE/outputs/android/arm64-v8a"
          make -j"$(sysctl -n hw.ncpu)"
          make install_sw

      # ----------------------------------------------------------------
      # 1b. FFmpeg → Android arm64-v8a  (linking OpenSSL)
      # ----------------------------------------------------------------
      - name: Build FFmpeg for Android arm64-v8a
        working-directory: ffmpeg
        run: |
          TOOLCHAIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/darwin-x86_64/bin"
          SYSROOT="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/darwin-x86_64/sysroot"
          OPENSSL="$GITHUB_WORKSPACE/outputs/android/arm64-v8a"
          PREFIX="$GITHUB_WORKSPACE/outputs/android/arm64-v8a"

          export PATH="$TOOLCHAIN:$PATH"

          ./configure \
            --prefix="$PREFIX" \
            --cross-prefix="$TOOLCHAIN/aarch64-linux-android-" \
            --target-os=android \
            --arch=aarch64 \
            --cpu=armv8-a \
            --cc="$TOOLCHAIN/aarch64-linux-android${{ env.MIN_API }}-clang" \
            --cxx="$TOOLCHAIN/aarch64-linux-android${{ env.MIN_API }}-clang++" \
            --nm="$TOOLCHAIN/llvm-nm" \
            --strip="$TOOLCHAIN/llvm-strip" \
            --enable-cross-compile \
            --sysroot="$SYSROOT" \
            --extra-cflags="-I$OPENSSL/include -fPIE -pie" \
            --extra-ldflags="-L$OPENSSL/lib -Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384" \
            --extra-ldexeflags="-pie" \
            --enable-runtime-cpudetect \
            --disable-static \
            --enable-shared \
            --enable-openssl \
            --enable-nonfree \
            --enable-version3 \
            --disable-ffprobe \
            --disable-ffplay \
            --disable-ffmpeg \
            --disable-debug \
            --disable-doc \
            --enable-avfilter \
            --enable-decoders \
            --enable-neon

          make -j"$(sysctl -n hw.ncpu)"
          make install

      # ----------------------------------------------------------------
      # 2a. OpenSSL → Android armeabi-v7a
      # ----------------------------------------------------------------
      - name: Build OpenSSL for Android armeabi-v7a
        working-directory: openssl
        run: |
          TOOLCHAIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/darwin-x86_64"
          export PATH="$TOOLCHAIN/bin:$PATH"
          export LDFLAGS="-Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384"

          make clean 2>/dev/null || true
          ./Configure android-arm -D__ANDROID_API__=${{ env.MIN_API }} \
            shared \
            no-ssl3 no-comp no-hw no-engine \
            --prefix="$GITHUB_WORKSPACE/outputs/android/armeabi-v7a" \
            --openssldir="$GITHUB_WORKSPACE/outputs/android/armeabi-v7a"
          make -j"$(sysctl -n hw.ncpu)"
          make install_sw

      # ----------------------------------------------------------------
      # 2b. FFmpeg → Android armeabi-v7a  (linking OpenSSL)
      # ----------------------------------------------------------------
      - name: Build FFmpeg for Android armeabi-v7a
        working-directory: ffmpeg
        run: |
          TOOLCHAIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/darwin-x86_64/bin"
          SYSROOT="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/darwin-x86_64/sysroot"
          OPENSSL="$GITHUB_WORKSPACE/outputs/android/armeabi-v7a"
          PREFIX="$GITHUB_WORKSPACE/outputs/android/armeabi-v7a"

          export PATH="$TOOLCHAIN:$PATH"

          make distclean 2>/dev/null || true

          ./configure \
            --prefix="$PREFIX" \
            --cross-prefix="$TOOLCHAIN/arm-linux-androideabi-" \
            --target-os=android \
            --arch=arm \
            --cpu=armv7-a \
            --cc="$TOOLCHAIN/armv7a-linux-androideabi${{ env.MIN_API }}-clang" \
            --cxx="$TOOLCHAIN/armv7a-linux-androideabi${{ env.MIN_API }}-clang++" \
            --nm="$TOOLCHAIN/llvm-nm" \
            --strip="$TOOLCHAIN/llvm-strip" \
            --enable-cross-compile \
            --sysroot="$SYSROOT" \
            --extra-cflags="-mfloat-abi=softfp -march=armv7-a -I$OPENSSL/include -fPIE -pie" \
            --extra-ldflags="-L$OPENSSL/lib -Wl,--fix-cortex-a8 -Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384" \
            --extra-ldexeflags="-pie" \
            --enable-runtime-cpudetect \
            --disable-static \
            --enable-shared \
            --enable-openssl \
            --enable-nonfree \
            --enable-version3 \
            --disable-ffprobe \
            --disable-ffplay \
            --disable-ffmpeg \
            --disable-debug \
            --disable-doc \
            --enable-avfilter \
            --enable-decoders \
            --enable-neon

          make -j"$(sysctl -n hw.ncpu)"
          make install

      # ----------------------------------------------------------------
      # Package & Upload
      # ----------------------------------------------------------------
      - name: Package Android libraries
        run: |
          mkdir -p dist/android/arm64-v8a dist/android/armeabi-v7a
          # lib output contains both OpenSSL (.so) and FFmpeg (.so) — same prefix
          cp -a "$GITHUB_WORKSPACE/outputs/android/arm64-v8a/lib/"*.so dist/android/arm64-v8a/
          cp -a "$GITHUB_WORKSPACE/outputs/android/armeabi-v7a/lib/"*.so dist/android/armeabi-v7a/
          # Headers (same for both ABIs — take from arm64)
          cp -a "$GITHUB_WORKSPACE/outputs/android/arm64-v8a/include" dist/android/
          echo "=== Android dist structure ==="
          find dist/android -type f | sort

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-libs
          path: dist/android/
          compression-level: 6

  # ====================================================================
  # Job 2/2: iOS Libraries (arm64 + simulator x86_64)
  # ====================================================================
  build-ios:
    name: iOS (arm64 + simulator)
    runs-on: macos-14
    defaults:
      run:
        shell: bash

    steps:
      # ----------------------------------------------------------------
      # Setup
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install gas-preprocessor (required by FFmpeg ARM assembly)
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/FFmpeg/gas-preprocessor/master/gas-preprocessor.pl" \
            -o /usr/local/bin/gas-preprocessor.pl
          chmod +x /usr/local/bin/gas-preprocessor.pl

      - name: Install nasm (required by FFmpeg x86_64 assembly)
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: brew install nasm

      # ----------------------------------------------------------------
      # Download sources
      # ----------------------------------------------------------------
      - name: Download OpenSSL source
        run: |
          curl -fsSL \
            "https://github.com/openssl/openssl/releases/download/openssl-${{ env.OPENSSL_VERSION }}/openssl-${{ env.OPENSSL_VERSION }}.tar.gz" \
            -o openssl.tar.gz
          tar xzf openssl.tar.gz
          mv "openssl-${{ env.OPENSSL_VERSION }}" openssl

      - name: Download FFmpeg source
        run: |
          curl -fsSL \
            "https://ffmpeg.org/releases/ffmpeg-${{ env.FFMPEG_VERSION }}.tar.gz" \
            -o ffmpeg.tar.gz
          tar xzf ffmpeg.tar.gz
          mv "ffmpeg-${{ env.FFMPEG_VERSION }}" ffmpeg

      # ----------------------------------------------------------------
      # 1a. OpenSSL → iOS arm64 (device)
      # ----------------------------------------------------------------
      - name: Build OpenSSL for iOS arm64
        working-directory: openssl
        run: |
          make clean 2>/dev/null || true
          ./Configure ios64-xcrun \
            no-shared \
            no-ssl3 no-comp no-hw no-engine \
            --prefix="$GITHUB_WORKSPACE/outputs/ios/arm64" \
            --openssldir="$GITHUB_WORKSPACE/outputs/ios/arm64"
          make -j"$(sysctl -n hw.ncpu)"
          make install_sw

      # ----------------------------------------------------------------
      # 1b. FFmpeg → iOS arm64 (device) — linking OpenSSL
      # ----------------------------------------------------------------
      - name: Build FFmpeg for iOS arm64
        working-directory: ffmpeg
        run: |
          OPENSSL="$GITHUB_WORKSPACE/outputs/ios/arm64"
          PREFIX="$GITHUB_WORKSPACE/outputs/ios/arm64"

          ./configure \
            --prefix="$PREFIX" \
            --target-os=darwin \
            --arch=arm64 \
            --cc="xcrun -sdk iphoneos clang" \
            --as="gas-preprocessor.pl -arch aarch64 -- xcrun -sdk iphoneos clang" \
            --enable-cross-compile \
            --disable-debug \
            --disable-programs \
            --disable-audiotoolbox \
            --disable-doc \
            --enable-static \
            --disable-shared \
            --enable-pic \
            --enable-openssl \
            --enable-nonfree \
            --enable-version3 \
            --enable-protocol=https \
            --enable-protocol=crypto \
            --enable-protocol=tls_openssl \
            --extra-cflags="-arch arm64 -mios-version-min=${{ env.MIN_IOS_SDK }} -I$OPENSSL/include" \
            --extra-ldflags="-arch arm64 -mios-version-min=${{ env.MIN_IOS_SDK }} -L$OPENSSL/lib -lcrypto -lssl"

          make -j"$(sysctl -n hw.ncpu)"
          make install

      # ----------------------------------------------------------------
      # 2a. OpenSSL → iOS simulator (x86_64)
      # ----------------------------------------------------------------
      - name: Build OpenSSL for iOS simulator
        working-directory: openssl
        run: |
          # Diagnose: check if xcrun can find the simulator SDK
          SIM_SDK=$(xcrun --sdk iphonesimulator --show-sdk-path 2>&1)
          echo "Simulator SDK: $SIM_SDK"
          xcrun --sdk iphonesimulator --show-sdk-version 2>&1 || echo "No SDK version"

          make clean 2>/dev/null || true

          # Try iossim-xcrun target first (correct for iOS simulator)
          if ./Configure iossim-xcrun \
            no-shared \
            no-ssl3 no-comp no-hw no-engine \
            --prefix="$GITHUB_WORKSPACE/outputs/ios/simulator" \
            --openssldir="$GITHUB_WORKSPACE/outputs/ios/simulator" 2>&1; then
            echo "=== iossim-xcrun configure SUCCESS ==="
          else
            echo "=== iossim-xcrun FAILED, trying ios64-xcrun with simulator override ==="
            SIM_SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path 2>&1)
            ./Configure ios64-xcrun \
              no-shared \
              no-ssl3 no-comp no-hw no-engine \
              --prefix="$GITHUB_WORKSPACE/outputs/ios/simulator" \
              --openssldir="$GITHUB_WORKSPACE/outputs/ios/simulator" \
              CC="xcrun -sdk iphonesimulator clang -target x86_64-apple-ios14.0-simulator" \
              CXX="xcrun -sdk iphonesimulator clang++ -target x86_64-apple-ios14.0-simulator" \
              CFLAGS="-isysroot $SIM_SDK_PATH -mios-simulator-version-min=${{ env.MIN_IOS_SDK }}" \
              LDFLAGS="-isysroot $SIM_SDK_PATH -mios-simulator-version-min=${{ env.MIN_IOS_SDK }}"
          fi

          make -j"$(sysctl -n hw.ncpu)"
          make install_sw

      # ----------------------------------------------------------------
      # 2b. FFmpeg → iOS simulator (x86_64) — linking OpenSSL
      # ----------------------------------------------------------------
      - name: Build FFmpeg for iOS simulator
        working-directory: ffmpeg
        run: |
          OPENSSL="$GITHUB_WORKSPACE/outputs/ios/simulator"
          PREFIX="$GITHUB_WORKSPACE/outputs/ios/simulator"

          make distclean 2>/dev/null || true

          ./configure \
            --prefix="$PREFIX" \
            --target-os=darwin \
            --arch=x86_64 \
            --cc="xcrun -sdk iphonesimulator clang" \
            --as="gas-preprocessor.pl -- xcrun -sdk iphonesimulator clang" \
            --enable-cross-compile \
            --disable-debug \
            --disable-programs \
            --disable-audiotoolbox \
            --disable-doc \
            --enable-static \
            --disable-shared \
            --enable-pic \
            --enable-openssl \
            --enable-nonfree \
            --enable-version3 \
            --enable-protocol=https \
            --enable-protocol=crypto \
            --enable-protocol=tls_openssl \
            --extra-cflags="-arch x86_64 -mios-simulator-version-min=${{ env.MIN_IOS_SDK }} -I$OPENSSL/include" \
            --extra-ldflags="-arch x86_64 -mios-simulator-version-min=${{ env.MIN_IOS_SDK }} -L$OPENSSL/lib -lcrypto -lssl"

          make -j"$(sysctl -n hw.ncpu)"
          make install

      # ----------------------------------------------------------------
      # Package & Upload
      # ----------------------------------------------------------------
      - name: Package iOS libraries
        run: |
          mkdir -p dist/ios/device/lib dist/ios/simulator/lib
          # Static .a libraries for iOS (App Store compatible — .dylib not allowed)
          cp -a "$GITHUB_WORKSPACE/outputs/ios/arm64/lib/"*.a dist/ios/device/lib/
          cp -a "$GITHUB_WORKSPACE/outputs/ios/arm64/include" dist/ios/device/
          cp -a "$GITHUB_WORKSPACE/outputs/ios/simulator/lib/"*.a dist/ios/simulator/lib/
          cp -a "$GITHUB_WORKSPACE/outputs/ios/simulator/include" dist/ios/simulator/
          echo "=== iOS dist structure ==="
          find dist/ios -type f | sort

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ios-libs
          path: dist/ios/
          compression-level: 6
